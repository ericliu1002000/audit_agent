{% extends "admin/base_site.html" %}

{% block content %}
  <h2>导入政府标准价格表</h2>
  <p>上传 .xlsx 后，将同步到 MySQL 与 Milvus 向量索引。</p>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="form-row">
      <label for="id_excel_file">Excel 文件 (.xlsx)</label>
      <input type="file" id="id_excel_file" name="excel_file" accept=".xlsx" required>
    </div>
    <div class="form-row">
      <label for="id_region">地区</label>
      <input type="text" id="id_region" name="region" placeholder="例如：天津市" required>
    </div>
    <div class="form-row">
      <label for="id_publish_month">发布月份</label>
      <input type="text" id="id_publish_month" name="publish_month" placeholder="例如：2025-12" required>
    </div>
    <div class="form-row">
      <label>
        <input type="checkbox" name="replace_existing" checked>
        替换同地区同月份旧数据
      </label>
    </div>
    <div class="form-row">
      <label>
        <input type="checkbox" name="default_tax_included" checked>
        表格未提供“是否含税”列时默认按含税处理
      </label>
    </div>
    <div class="submit-row">
      <input type="submit" class="default" value="开始导入">
      <a href="{% url 'admin:budget_audit_budgetpriceitem_changelist' %}" class="button cancel-link">返回列表</a>
    </div>
  </form>
{% endblock %}
