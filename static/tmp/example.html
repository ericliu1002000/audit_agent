    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root {
            --primary-color: #1890ff; /* 政务蓝 */
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-color: #333;
        }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: var(--text-color);
        }
        .header {
            background: var(--card-bg);
            padding: 20px 30px;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { margin: 0; font-size: 24px; color: #002766; }
        .header .sub-text { color: #666; font-size: 14px; margin-top: 5px; }
        
        .kpi-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        .kpi-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            text-align: center;
        }
        .kpi-title { color: #8c8c8c; font-size: 14px; margin-bottom: 10px; }
        .kpi-value { font-size: 32px; font-weight: bold; color: #002766; }
        .kpi-value.red { color: #cf1322; }
        .kpi-value.green { color: #3f8600; }

        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 两列布局 */
            gap: 20px;
        }
        .chart-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            height: 450px;
        }
        .chart-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            border-left: 4px solid var(--primary-color);
            padding-left: 10px;
            display: flex;
            justify-content: space-between;
        }
        .chart-desc { font-size: 12px; color: #999; font-weight: normal; }
        .full-width { grid-column: span 2; }
    </style>
</head>

        </div>
        <div style="text-align: right;">
            <span style="background:#e6f7ff; color:#1890ff; padding:5px 10px; border-radius:4px; font-size:12px;">智能审核系统 V1.0</span>
        </div>
    </div>

    <div class="kpi-container">
        <div class="kpi-card">
            <div class="kpi-title">项目总体平均分 (PQI)</div>
            <div class="kpi-value" id="avg-score">-</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-title">一次性通过率</div>

        </div>
        <div class="kpi-card">
            <div class="kpi-title">高风险项目数 (<60分)</div>
            <div class="kpi-value red" id="risk-count">-</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-title">发现问题总数</div>
            <div class="kpi-value" id="total-errors">-</div>
        </div>
    </div>

    <div class="charts-grid">
        <div class="chart-card full-width">
            <div class="chart-title">
                共性问题分布 (Pareto Chart)

            </div>
            <div id="chart-pareto" style="width: 100%; height: 90%;"></div>
        </div>

        <div class="chart-card">
            <div class="chart-title">

            <div id="chart-scatter" style="width: 100%; height: 90%;"></div>

            <div id="chart-ranking" style="width: 100%; height: 90%;"></div>
