<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天津市级预算绩效目标审核分析报告 (演示版)</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root {
            --primary-color: #1890ff; /* 政务蓝 */
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-color: #333;
        }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: var(--text-color);
        }
        .header {
            background: var(--card-bg);
            padding: 20px 30px;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { margin: 0; font-size: 24px; color: #002766; }
        .header .sub-text { color: #666; font-size: 14px; margin-top: 5px; }
        
        .kpi-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        .kpi-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            text-align: center;
        }
        .kpi-title { color: #8c8c8c; font-size: 14px; margin-bottom: 10px; }
        .kpi-value { font-size: 32px; font-weight: bold; color: #002766; }
        .kpi-value.red { color: #cf1322; }
        .kpi-value.green { color: #3f8600; }

        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 两列布局 */
            gap: 20px;
        }
        .chart-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            height: 450px;
        }
        .chart-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            border-left: 4px solid var(--primary-color);
            padding-left: 10px;
            display: flex;
            justify-content: space-between;
        }
        .chart-desc { font-size: 12px; color: #999; font-weight: normal; }
        .full-width { grid-column: span 2; }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1>天津市级预算绩效目标审核分析报告</h1>
            <div class="sub-text">数据来源：2026年度项目申报库  | 样本量：1500 | 生成时间：2025-11-21</div>
        </div>
        <div style="text-align: right;">
            <span style="background:#e6f7ff; color:#1890ff; padding:5px 10px; border-radius:4px; font-size:12px;">智能审核系统 V1.0</span>
        </div>
    </div>

    <div class="kpi-container">
        <div class="kpi-card">
            <div class="kpi-title">项目总体平均分 (PQI)</div>
            <div class="kpi-value" id="avg-score">-</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-title">高质量通过率 (≥80分)</div>
            <div class="kpi-value green" id="pass-rate">-</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-title">需整改项目数 (<80分)</div>
            <div class="kpi-value red" id="risk-count">-</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-title">发现问题总数</div>
            <div class="kpi-value" id="total-errors">-</div>
        </div>
    </div>

    <div class="charts-grid">
        <div class="chart-card full-width">
            <div class="chart-title">
                共性问题帕累托分析 (Pareto Chart)
                <span class="chart-desc">识别导致80%审核不通过的“关键少数”问题</span>
            </div>
            <div id="chart-pareto" style="width: 100%; height: 90%;"></div>
        </div>

        <div class="chart-card">
            <div class="chart-title">
                资金-质量四象限监管图谱
                <span class="chart-desc" style="color:#cf1322; font-weight:bold;">警告：标准提升，80分以下即为风险</span>
            </div>
            <div id="chart-scatter" style="width: 100%; height: 90%;"></div>
        </div>

        <div class="chart-card">
            <div class="chart-title">
                部门绩效编制质量红黑榜
                <span class="chart-desc">基于PQI指数的部门排名 (后10名预警)</span>
            </div>
            <div id="chart-ranking" style="width: 100%; height: 90%;"></div>
        </div>
    </div>

    <script>
        // ================= 数据生成逻辑 =================
        
        const deptNames = Array.from({length: 20}, (_, i) => `市${String.fromCharCode(65+i)}委`); 
        deptNames.push(...Array.from({length: 10}, (_, i) => `市${String.fromCharCode(75+i)}局`));
        
        // 错误类型分布
        let errorDataRaw = [
            { name: "可衡量性", value: 450 }, 
            { name: "错别字/规范", value: 320 },
            { name: "相关性", value: 210 }, 
            { name: "完整性", value: 150 }, 
            { name: "匹配度", value: 80 },  
            { name: "合规性", value: 45 }   
        ];

        const totalErrorCount = errorDataRaw.reduce((sum, item) => sum + item.value, 0);
        let cumulativeSum = 0;
        const paretoData = errorDataRaw.map(item => {
            cumulativeSum += item.value;
            return {
                name: item.name,
                value: item.value,
                ratio: parseFloat(((cumulativeSum / totalErrorCount) * 100).toFixed(1))
            };
        });

        // 模拟数据
        let scatterData = [];
        let totalScoreSum = 0;
        let riskProjectCount = 0; // 这里的定义变了，<80分就算风险
        
        for(let i=0; i<150; i++) { 
            let budget = Math.exp(Math.random() * 4 + 4).toFixed(2); 
            if(budget > 50000) budget = 50000; 

            let score = Math.floor(Math.random() * 40 + 60); // 60-100分
            if (Math.random() < 0.1) score = Math.floor(Math.random() * 30 + 30);

            // 关键修改：统计逻辑跟随80分的新标准
            if(score < 80) riskProjectCount++;
            totalScoreSum += score;

            let dept = deptNames[Math.floor(Math.random() * deptNames.length)];
            scatterData.push([parseFloat(budget), score, dept, `PJ-${2026000+i}`]);
        }
        const avgScore = (totalScoreSum / 150).toFixed(1);

        let deptRankingData = deptNames.slice(0, 10).map(name => {
            return { name: name, value: (Math.random() * 20 + 70).toFixed(1) };
        }).sort((a, b) => a.value - b.value); 

        // ================= 渲染图表 =================

        document.getElementById('avg-score').innerText = avgScore;
        // KPI显示的是“高质量通过率”，标准变严了
        document.getElementById('pass-rate').innerText = ((1 - riskProjectCount/150)*100).toFixed(1) + "%";
        document.getElementById('risk-count').innerText = riskProjectCount;
        document.getElementById('total-errors').innerText = totalErrorCount;

        // 1. 帕累托图
        const chartPareto = echarts.init(document.getElementById('chart-pareto'));
        chartPareto.setOption({
            tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
            legend: { data: ['问题频次', '累计占比'] },
            grid: { top: '15%', bottom: '10%', left: '10%', right: '10%' },
            xAxis: { type: 'category', data: paretoData.map(i => i.name) },
            yAxis: [
                { type: 'value', name: '频次' },
                { type: 'value', name: '累计占比(%)', min: 0, max: 100, axisLabel: { formatter: '{value} %' } }
            ],
            series: [
                { name: '问题频次', type: 'bar', data: paretoData.map(i => i.value), itemStyle: { color: '#1890ff' }, barWidth: '40%' },
                { name: '累计占比', type: 'line', yAxisIndex: 1, data: paretoData.map(i => i.ratio), itemStyle: { color: '#faad14' } }
            ]
        });

        // 2. 四象限图 (核心修改)
        const chartScatter = echarts.init(document.getElementById('chart-scatter'));
        chartScatter.setOption({
            tooltip: {
                backgroundColor: 'rgba(255,255,255,0.9)',
                formatter: function (param) {
                    // 提示框里的红字逻辑也改成80分
                    return `<div style="font-weight:bold">${param.data[2]}</div>` + 
                           `项目ID: ${param.data[3]}<br/>` + 
                           `资金: ${param.data[0]} 万元<br/>` + 
                           `得分: <span style="color:${param.data[1]<80?'red':'#333'}">${param.data[1]}</span>`;
                }
            },
            grid: { top: '10%', right: '10%' },
            xAxis: { 
                name: '资金规模(万元)', 
                type: 'log',
                nameLocation: 'middle',
                nameGap: 25,
                logBase: 10
            },
            yAxis: { 
                name: '质量得分(PQI)', 
                min: 0, max: 100,
                splitLine: { lineStyle: { type: 'dashed' } } 
            },
            visualMap: {
                min: 0, max: 100,
                dimension: 1,
                orient: 'horizontal',
                right: 'center', top: 0,
                text: ['优质', '风险'],
                // 关键修改：调整颜色映射，让80分以下变红/黄，80以上才绿
                pieces: [
                    {gt: 80, lte: 100, color: '#52c41a'}, // 80-100 绿
                    {gt: 60, lte: 80, color: '#faad14'},  // 60-80 黄
                    {gt: 0, lte: 60, color: '#cf1322'}    // 0-60 红
                ]
            },
            series: [{
                type: 'scatter',
                symbolSize: function (data) { return Math.log(data[0]) * 3 + 5; },
                data: scatterData,
                markLine: {
                    silent: true,
                    lineStyle: { color: '#333', width: 2 },
                    data: [
                        // 关键修改：线画在80分
                        { yAxis: 80, label: { formatter: '达标线 (80分)', position: 'start', color: 'red', fontWeight: 'bold' } },
                        { xAxis: 1000, label: { formatter: '重点资金线 (1000万)', position: 'end' } }
                    ]
                },
                markArea: {
                    silent: true,
                    itemStyle: { color: 'transparent', borderWidth: 1, borderType: 'dashed' },
                    data: [
                        // 关键修改：区域覆盖到80分
                        [{
                            name: '重点监管区\n(钱多质差)',
                            xAxis: 1000,
                            yAxis: 0,
                            label: { color: 'red', position: 'insideBottomRight', fontSize: 14, fontWeight: 'bold' },
                            itemStyle: { color: 'rgba(255, 77, 79, 0.1)' }
                        }, {
                            xAxis: 50000,
                            yAxis: 80 // 区域高度拉升到80
                        }]
                    ]
                }
            }]
        });

        // 3. 部门排名
        const chartRanking = echarts.init(document.getElementById('chart-ranking'));
        chartRanking.setOption({
            tooltip: { trigger: 'axis', formatter: '{b}: {c} 分' },
            grid: { left: '3%', right: '8%', bottom: '3%', containLabel: true },
            xAxis: { type: 'value', max: 100, splitLine: { show: false } },
            yAxis: { type: 'category', data: deptRankingData.map(i => i.name) },
            series: [{
                name: '平均得分',
                type: 'bar',
                data: deptRankingData.map(i => i.value),
                barWidth: '60%',
                label: { show: true, position: 'right' },
                itemStyle: {
                    color: function(params) {
                        // 关键修改：因为标准严了，低于80的都给警告色
                        const score = params.value;
                        if (score < 80) return new echarts.graphic.LinearGradient(0, 0, 1, 0, [{offset: 0, color: '#ff7875'}, {offset: 1, color: '#ff4d4f'}]);
                        return new echarts.graphic.LinearGradient(0, 0, 1, 0, [{offset: 0, color: '#69c0ff'}, {offset: 1, color: '#1890ff'}]);
                    },
                    borderRadius: [0, 4, 4, 0]
                }
            }]
        });

        window.addEventListener('resize', function() {
            chartPareto.resize();
            chartScatter.resize();
            chartRanking.resize();
        });
    </script>
</body>
</html>
