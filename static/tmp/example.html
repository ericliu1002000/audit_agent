<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天津市级预算绩效目标审核分析报告 (演示版)</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root {
            --primary-color: #1890ff;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-color: #333;
            /* 动态计算高度间距 */
            --header-height: 70px;
            --kpi-height: 110px;
            --gap: 15px;
        }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: var(--gap);
            color: var(--text-color);
            /* 核心：一屏布局 */
            height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* 禁止滚动 */
        }

        /* 1. 头部区域 */
        .header {
            background: var(--card-bg);
            padding: 0 20px;
            height: var(--header-height);
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0; /* 防止被压缩 */
            margin-bottom: var(--gap);
        }
        .header h1 { margin: 0; font-size: 22px; color: #002766; }
        .header .sub-text { color: #666; font-size: 12px; margin-top: 4px; }

        /* 2. KPI 区域 */
        .kpi-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--gap);
            height: var(--kpi-height);
            flex-shrink: 0;
            margin-bottom: var(--gap);
        }
        .kpi-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .kpi-title { color: #8c8c8c; font-size: 13px; margin-bottom: 5px; }
        .kpi-value { font-size: 28px; font-weight: bold; color: #002766; line-height: 1; }
        .kpi-value.red { color: #cf1322; }
        .kpi-value.green { color: #3f8600; }

        /* 3. 图表区域 (自动填满剩余高度) */
        .charts-grid {
            flex: 1; /* 占据剩余所有空间 */
            display: grid;
            grid-template-columns: 40% 60%; /* 左4右6，给四象限更多空间 */
            grid-template-rows: 50% 50%; /* 上下平分 */
            gap: var(--gap);
            min-height: 0; /* 关键：允许Grid子项小于内容高度 */
        }

        .chart-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 布局调整：四象限图占据右侧整列 */
        .area-scatter { grid-column: 2 / 3; grid-row: 1 / 3; }
        .area-pareto { grid-column: 1 / 2; grid-row: 1 / 2; }
        .area-ranking { grid-column: 1 / 2; grid-row: 2 / 3; }

        .chart-title {
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 10px;
            border-left: 4px solid var(--primary-color);
            padding-left: 10px;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        .chart-desc { font-size: 11px; color: #999; font-weight: normal; }
        
        /* 让Echarts容器自动填满卡片剩余空间 */
        .chart-body {
            flex: 1;
            width: 100%;
            min-height: 0;
        }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1>天津市级预算绩效目标审核分析报告</h1>
            <div class="sub-text">数据来源：2026年度项目申报库 (模拟脱敏) | 样本量：1500 | 生成时间：2025-11-21</div>
        </div>
        <div>
            <span style="background:#e6f7ff; color:#1890ff; padding:4px 8px; border-radius:4px; font-size:12px; font-weight:bold;">
                状态：演示模式
            </span>
        </div>
    </div>

    <div class="kpi-container">
        <div class="kpi-card">
            <div class="kpi-title">项目总体平均分 (PQI)</div>
            <div class="kpi-value" id="avg-score">-</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-title">优质达标率 (≥80分)</div>
            <div class="kpi-value green" id="pass-rate">-</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-title">不合格项目数 (&lt;60分)</div>
            <div class="kpi-value red" id="fail-count">-</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-title">需整改项目数 (60-80分)</div>
            <div class="kpi-value" style="color:#faad14" id="warning-count">-</div>
        </div>
    </div>

    <div class="charts-grid">
        <div class="chart-card area-pareto">
            <div class="chart-title">
                共性问题分布
                <span class="chart-desc">审核不通过的主要原因分析</span>
            </div>
            <div id="chart-pareto" class="chart-body"></div>
        </div>

        <div class="chart-card area-ranking">
            <div class="chart-title">
                部门编制质量红黑榜
                <span class="chart-desc">PQI指数倒数排名预警</span>
            </div>
            <div id="chart-ranking" class="chart-body"></div>
        </div>

        <div class="chart-card area-scatter">
            <div class="chart-title">
                资金-质量四象限监管图谱
                <span class="chart-desc" style="color:#cf1322; font-weight:bold;">
                    重点监管：右下角(高投入低质量)区域
                </span>
            </div>
            <div id="chart-scatter" class="chart-body"></div>
        </div>
    </div>

    <script>
        // ================= 数据生成逻辑 (严格按照 65% - 30% - 5%) =================
        
        const deptNames = Array.from({length: 20}, (_, i) => `市${String.fromCharCode(65+i)}委`); 
        deptNames.push(...Array.from({length: 10}, (_, i) => `市${String.fromCharCode(75+i)}局`));
        
        // 1. 生成四象限散点数据
        let scatterData = [];
        let totalScoreSum = 0;
        let failCount = 0;     // <60
        let warningCount = 0;  // 60-80
        let passCount = 0;     // >=80
        
        // 模拟 150 个展示点
        for(let i=0; i<150; i++) { 
            // 资金分布：对数正态分布模拟真实财政数据
            let budget = Math.exp(Math.random() * 4 + 4).toFixed(2); 
            if(budget > 50000) budget = 50000; 

            // 核心修改：按指定概率生成分数
            let rand = Math.random();
            let score;

            if (rand < 0.05) { 
                // 5% 不合格 (<60分)
                score = Math.floor(Math.random() * 20 + 40); // 40-59分
                failCount++;
            } else if (rand < 0.35) { 
                // 30% 需整改 (60-79分) (0.05 + 0.30 = 0.35)
                score = Math.floor(Math.random() * 20 + 60); // 60-79分
                warningCount++;
            } else {
                // 65% 合规优质 (80-100分)
                score = Math.floor(Math.random() * 21 + 80); // 80-100分
                if(score > 100) score = 100;
                passCount++;
            }

            totalScoreSum += score;
            let dept = deptNames[Math.floor(Math.random() * deptNames.length)];
            scatterData.push([parseFloat(budget), score, dept, `PJ-${2026000+i}`]);
        }
        const avgScore = (totalScoreSum / 150).toFixed(1);

        // 2. 部门排名数据 (模拟)
        let deptRankingData = deptNames.slice(0, 10).map(name => {
            return { name: name, value: (Math.random() * 20 + 65).toFixed(1) };
        }).sort((a, b) => a.value - b.value); 

        // 3. 帕累托数据
        let errorDataRaw = [
            { name: "可衡量性不足", value: 450 }, 
            { name: "错别字/不规范", value: 320 },
            { name: "相关性缺失", value: 210 }, 
            { name: "完整性缺失", value: 150 }, 
            { name: "投入产出不匹配", value: 80 },  
            { name: "合规性问题", value: 45 }   
        ];
        const totalErrorCount = errorDataRaw.reduce((sum, item) => sum + item.value, 0);
        let cumulativeSum = 0;
        const paretoData = errorDataRaw.map(item => {
            cumulativeSum += item.value;
            return {
                name: item.name,
                value: item.value,
                ratio: parseFloat(((cumulativeSum / totalErrorCount) * 100).toFixed(1))
            };
        });

        // ================= DOM 填充 =================

        document.getElementById('avg-score').innerText = avgScore;
        document.getElementById('pass-rate').innerText = ((passCount/150)*100).toFixed(1) + "%";
        document.getElementById('fail-count').innerText = failCount;
        document.getElementById('warning-count').innerText = warningCount;

        // ================= Echarts 初始化 =================

        // 1. 帕累托图 (左上)
        const chartPareto = echarts.init(document.getElementById('chart-pareto'));
        chartPareto.setOption({
            tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
            grid: { top: '15%', bottom: '12%', left: '12%', right: '12%' },
            xAxis: { 
                type: 'category', 
                data: paretoData.map(i => i.name),
                axisLabel: { interval: 0, rotate: 20, fontSize: 10 } 
            },
            yAxis: [
                { type: 'value', name: '频次', splitLine: { show: false } },
                { type: 'value', name: '占比%', min: 0, max: 100, show: false }
            ],
            series: [
                { name: '频次', type: 'bar', data: paretoData.map(i => i.value), itemStyle: { color: '#1890ff' }, barWidth: '40%' },
                { name: '占比', type: 'line', yAxisIndex: 1, data: paretoData.map(i => i.ratio), itemStyle: { color: '#faad14' } }
            ]
        });

        // 2. 部门排名 (左下)
        const chartRanking = echarts.init(document.getElementById('chart-ranking'));
        chartRanking.setOption({
            tooltip: { trigger: 'axis', formatter: '{b}: {c} 分' },
            grid: { top: '5%', left: '3%', right: '10%', bottom: '3%', containLabel: true },
            xAxis: { type: 'value', max: 100, splitLine: { show: false } },
            yAxis: { type: 'category', data: deptRankingData.map(i => i.name), axisLabel: { fontSize: 11 } },
            series: [{
                name: '平均得分',
                type: 'bar',
                data: deptRankingData.map(i => i.value),
                barWidth: '60%',
                label: { show: true, position: 'right', fontSize: 11 },
                itemStyle: {
                    color: function(params) {
                        return params.value < 75 ? '#ff4d4f' : '#1890ff';
                    },
                    borderRadius: [0, 4, 4, 0]
                }
            }]
        });

        // 3. 四象限图 (右侧)
        const chartScatter = echarts.init(document.getElementById('chart-scatter'));
        chartScatter.setOption({
            tooltip: {
                backgroundColor: 'rgba(255,255,255,0.95)',
                textStyle: { color: '#333' },
                formatter: function (param) {
                    let color = param.data[1] < 60 ? '#cf1322' : (param.data[1] < 80 ? '#faad14' : '#52c41a');
                    return `<div style="font-weight:bold; border-bottom:1px solid #eee; padding-bottom:5px; margin-bottom:5px;">${param.data[2]}</div>` + 
                           `项目ID: ${param.data[3]}<br/>` + 
                           `资金: <b>${param.data[0]}</b> 万元<br/>` + 
                           `得分: <b style="color:${color}">${param.data[1]}</b> 分`;
                }
            },
            grid: { top: '12%', right: '8%', bottom: '10%', left: '8%' },
            xAxis: { 
                name: '资金规模(万元) [对数坐标]', 
                type: 'log',
                nameLocation: 'middle',
                nameGap: 25,
                logBase: 10,
                splitLine: { show: false }
            },
            yAxis: { 
                name: '质量得分(PQI)', 
                min: 30, max: 100, // 聚焦30-100区间展示
                splitLine: { lineStyle: { type: 'dashed', color: '#eee' } } 
            },
            visualMap: {
                min: 30, max: 100,
                dimension: 1,
                orient: 'horizontal',
                right: 'center', top: 0,
                itemWidth: 10, itemHeight: 100, 
                text: ['优质', '不合格'],
                pieces: [
                    {gt: 80, lte: 100, color: '#52c41a', label: '优质 (≥80)'},
                    {gt: 60, lte: 80, color: '#faad14', label: '整改 (60-80)'},
                    {gt: 0, lte: 60, color: '#cf1322', label: '不合格 (<60)'}
                ]
            },
            series: [{
                type: 'scatter',
                symbolSize: function (data) { return Math.log(data[0]) * 4 + 6; },
                data: scatterData,
                itemStyle: { opacity: 0.8, shadowBlur: 2, shadowColor: 'rgba(0,0,0,0.2)' },
                markLine: {
                    silent: true,
                    symbol: 'none',
                    lineStyle: { color: '#555', width: 1, type: 'solid' },
                    data: [
                        { yAxis: 80, label: { formatter: '达标线 80', position: 'end', color: '#52c41a' } },
                        { yAxis: 60, label: { formatter: '及格线 60', position: 'end', color: '#cf1322' } },
                        { xAxis: 1000, label: { formatter: '重点资金线', position: 'start' } }
                    ]
                },
                markArea: {
                    silent: true,
                    data: [
                        // 右下角重点监管区
                        [{
                            name: '重点监管区\n(投入大/质量差)',
                            xAxis: 1000,
                            yAxis: 30,
                            label: { color: '#cf1322', position: 'insideBottomRight', fontSize: 14, fontWeight: 'bold', padding: [0, 20, 20, 0] },
                            itemStyle: { color: 'rgba(207, 19, 34, 0.05)' }
                        }, {
                            xAxis: 50000,
                            yAxis: 80
                        }]
                    ]
                }
            }]
        });

        // 自动适配屏幕
        window.addEventListener('resize', function() {
            chartPareto.resize();
            chartScatter.resize();
            chartRanking.resize();
        });
    </script>
</body>
</html>
