<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面未找到 · Audit Agent</title>
    <style>
        :root {
            color-scheme: light dark;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            color: #f8fafc;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(248, 250, 252, 0.15);
            border-radius: 16px;
            padding: 48px 42px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.6);
            max-width: 420px;
        }
        h1 {
            margin-bottom: 8px;
            font-size: 56px;
            letter-spacing: 4px;
        }
        h2 {
            margin: 0 0 16px;
            font-size: 24px;
        }
        p {
            margin: 0 0 32px;
            color: #cbd5f5;
        }
        a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 999px;
            color: #0f172a;
            background: #38bdf8;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.2s ease, transform 0.2s ease;
        }
        a:hover {
            background: #7dd3fc;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
<div class="card">
    <h1>404</h1>
    <h2>抱歉，页面走丢了</h2>
    <p>我们没有找到你要访问的内容。可以返回首页重新开始。</p>
    <a href="/">返回首页</a>
</div>
</body>
</html>
